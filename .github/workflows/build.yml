name: Build Executables

on:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: arcade-led-bridge
  WORK_DIR: arcade-led-bridge

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-amd64
            exe_name: arcade-led-bridge
          - os: macos-latest
            target: macos-arm64
            exe_name: arcade-led-bridge-arm64
          - os: macos-26-intel
            target: macos-amd64
            exe_name: arcade-led-bridge-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ${{ env.WORK_DIR }}
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        working-directory: ${{ env.WORK_DIR }}
        run: >
          pyinstaller
          --onefile
          --name ${{ matrix.exe_name }}
          --add-data "config.py:."
          bridge.py

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: ${{ env.WORK_DIR }}/dist
        run: Compress-Archive -Path ${{ matrix.exe_name }}.exe -DestinationPath ${{ matrix.exe_name }}-${{ matrix.target }}.zip

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        working-directory: ${{ env.WORK_DIR }}/dist
        run: zip ${{ matrix.exe_name }}-${{ matrix.target }}.zip ${{ matrix.exe_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.exe_name }}-${{ matrix.target }}
          path: ${{ env.WORK_DIR }}/dist/${{ matrix.exe_name }}-${{ matrix.target }}.zip
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
